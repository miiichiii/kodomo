<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>中学2年 理科 天気クイズ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient-light: linear-gradient(135deg, #a8edea, #fed6e3);
      --bg-gradient-dark: radial-gradient(ellipse at top, #1f2937 0%, #0b1220 55%, #050912 100%);
      --card-bg-light: rgba(255, 255, 255, 0.7);
      --card-bg-dark: rgba(17, 24, 39, 0.6);
      --text-light: #333;
      --text-dark: #e5e7eb;
      --accent: #007aff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans JP', sans-serif;
      line-height: 1.6;
      color: var(--text-light);
      background: var(--bg-gradient-light);
      background-size: cover;
      background-attachment: fixed;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.dark-theme {
      color: var(--text-dark);
      background: var(--bg-gradient-dark);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background-color: var(--card-bg-light);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      animation: fadeIn 0.5s ease;
    }

    body.dark-theme .card {
      background-color: var(--card-bg-dark);
      border-color: rgba(255, 255, 255, 0.1);
    }

    h1, h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }

    button {
      cursor: pointer;
      border: none;
      outline: none;
      font-family: inherit;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 15px;
    }

    .theme-toggle {
      background: rgba(0, 0, 0, 0.1);
      color: inherit;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9em;
      transition: 0.3s;
    }
    .theme-toggle:hover { background: rgba(0, 0, 0, 0.2); }
    body.dark-theme .theme-toggle { background: rgba(255, 255, 255, 0.1); }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .menu-btn {
      padding: 20px;
      border-radius: 12px;
      background: white;
      font-size: 1.1em;
      font-weight: bold;
      color: #333;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    body.dark-theme .menu-btn {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .menu-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 12px rgba(0,0,0,0.1);
    }

    .menu-btn.primary {
      background: linear-gradient(135deg, #007aff, #00c6ff);
      color: white;
      grid-column: 1 / -1;
      text-align: center;
      justify-content: center;
      font-size: 1.3em;
      padding: 30px;
    }

    .badge {
      background: rgba(0,0,0,0.1);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.8em;
    }

    .progress-area {
      margin-bottom: 20px;
    }
    .progress-bar-bg {
      background: rgba(0,0,0,0.1);
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: #007aff;
      height: 100%;
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.9em;
      margin-top: 5px;
      font-weight: bold;
    }

    .question-text {
      font-size: 1.3em;
      margin-bottom: 14px;
    }

    .question-image-wrap {
      margin-bottom: 18px;
      text-align: center;
      display: none;
    }

    .question-image {
      max-width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.12);
      background: #fff;
    }

    .question-image-caption {
      font-size: 0.85em;
      opacity: 0.8;
      margin-top: 6px;
    }

    .options-grid {
      display: grid;
      gap: 12px;
    }

    .option-btn {
      padding: 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.8);
      text-align: left;
      font-size: 1em;
      transition: 0.2s;
      border: 2px solid transparent;
    }
    body.dark-theme .option-btn { background: rgba(255,255,255,0.1); color: white; }

    .option-btn:hover:not(:disabled) {
      background: white;
      transform: scale(1.01);
    }
    body.dark-theme .option-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); }

    .option-btn.correct {
      background: #d1fae5;
      border-color: #34c759;
      color: #065f46;
    }
    .option-btn.incorrect {
      background: #fee2e2;
      border-color: #ef4444;
      color: #991b1b;
    }

    .explanation {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.9);
      border-radius: 10px;
      border-left: 5px solid #007aff;
      display: none;
      animation: slideDown 0.3s ease;
    }
    body.dark-theme .explanation { background: rgba(0,0,0,0.3); }

    .nav-btn {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      background: #007aff;
      color: white;
      font-weight: bold;
      font-size: 1.1em;
      display: none;
    }
    .nav-btn:hover { background: #0056b3; }

    .result-score {
      text-align: center;
      font-size: 3em;
      font-weight: bold;
      color: #007aff;
      margin: 20px 0;
    }
    .result-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .action-btn {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      font-weight: bold;
      background: #6b7280;
      color: white;
    }
    .action-btn.primary { background: #007aff; }
    .action-btn:hover { opacity: 0.9; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="toolbar">
    <button class="theme-toggle" onclick="toggleTheme()">🌙 ダークモード切替</button>
  </div>

  <div id="start-screen" class="card">
    <h1>中学2年 理科<br>天気の変化 クイズ</h1>
    
    <div style="background-color: rgba(255, 255, 255, 0.6); padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 0.95em; line-height: 1.6; border-left: 4px solid #007aff;">
      <p style="margin: 0 0 10px 0;"><strong>🐣 はじめに</strong></p>
      <p style="margin: 0 0 10px 0;">テスト対策としてスマホでサクサク解けるように作りました！<br>
      間違えた問題はしっかり解説を読んで、天気の苦手を克服しよう！</p>
    </div>
    
    <div class="menu-grid">
      <button class="menu-btn primary" onclick="startQuiz('all')">
        <span>🔥 全問からランダム出題</span>
      </button>
      
      <button class="menu-btn" onclick="startQuiz('pressure')">
        <span>気圧と風・雲のでき方</span>
        <span class="badge">10問</span>
      </button>
      <button class="menu-btn" onclick="startQuiz('fronts')">
        <span>前線と天気の変化</span>
        <span class="badge">10問</span>
      </button>
      <button class="menu-btn" onclick="startQuiz('japan')">
        <span>日本の天気（四季の特徴）</span>
        <span class="badge">10問</span>
      </button>
      <button class="menu-btn" onclick="startQuiz('practical')">
        <span>🖼️ 実践編（画像問題）</span>
        <span class="badge">6問</span>
      </button>
    </div>
  </div>

  <div id="quiz-screen" class="card hidden">
    <div class="progress-area">
      <div class="progress-bar-bg">
        <div id="progress-bar" class="progress-bar-fill"></div>
      </div>
      <div class="progress-text">
        <span id="question-count">Q. 1 / 10</span>
        <span id="mode-label">モード</span>
      </div>
    </div>

    <div id="question-text" class="question-text"></div>
    <div id="question-image-wrap" class="question-image-wrap">
      <img id="question-image" class="question-image" alt="問題画像">
      <div id="question-image-caption" class="question-image-caption"></div>
    </div>
    <div id="options-grid" class="options-grid"></div>

    <div id="explanation" class="explanation">
      <strong>💡 解説</strong>
      <p id="explanation-text"></p>
    </div>

    <button id="next-btn" class="nav-btn" onclick="nextQuestion()">次の問題へ</button>
  </div>

  <div id="result-screen" class="card hidden">
    <h2>結果発表！</h2>
    <div class="result-score">
      <span id="score-num">0</span> <span style="font-size:0.5em; color:var(--text-light)">/</span> <span id="total-num" style="font-size:0.5em; color:var(--text-light)">0</span>
    </div>
    <p id="result-msg" style="text-align:center; font-weight:bold;"></p>
    
    <div id="wrong-list" style="margin-top:20px; display:none;">
      <h3 style="border-bottom:1px solid #ddd; padding-bottom:10px;">要復習リスト</h3>
      <ul id="wrong-items" style="text-align:left; font-size:0.9em; padding-left:20px;"></ul>
    </div>

    <div class="result-actions">
      <button class="action-btn" onclick="showStartScreen()">🏠 メニューに戻る</button>
      <button class="action-btn primary" onclick="retryQuiz()">🔄 もう一度やる</button>
    </div>
  </div>
</div>

<script>
const ALL_QUIZZES = {
  "pressure": [
    { "question": "空気が温められると、空気の密度と気圧はどうなりますか？", "options": ["密度は小さくなり、気圧は低くなる", "密度は大きくなり、気圧は高くなる", "密度は小さくなり、気圧は高くなる", "密度は大きくなり、気圧は低くなる"], "answer": 0, "explanation": "空気が温められると膨張するため、密度が小さく（軽く）なり上昇気流が生じます。その結果、地表付近の気圧は低くなります（低気圧）。" },
    { "question": "風は気圧がどのような場所からどのような場所に向かって吹きますか？", "options": ["気圧の高いところから低いところへ", "気圧の低いところから高いところへ", "気圧に関係なく吹く", "上空から地上へ"], "answer": 0, "explanation": "風は常に、気圧の高いところ（高気圧）から低いところ（低気圧）に向かって吹きます。" },
    { "question": "北半球における低気圧のまわりの風の吹き方はどれですか？", "options": ["反時計回りに吹き込む", "時計回りに吹き込む", "反時計回りに吹き出す", "時計回りに吹き出す"], "answer": 0, "explanation": "北半球の低気圧では、コリオリの力の影響で、中心に向かって「反時計回りに吹き込む」風になります。" },
    { "question": "空気中の水蒸気が冷やされて、水滴に変わるときの温度を何といいますか？", "options": ["露点", "沸点", "氷点", "飽和点"], "answer": 0, "explanation": "空気が冷え、これ以上水蒸気を含むことができなくなり（飽和水蒸気量に達し）、水滴ができ始める温度を「露点（ろてん）」といいます。" },
    { "question": "雲ができるときの空気の変化として正しいものはどれですか？", "options": ["空気が上昇し、膨張して温度が下がる", "空気が上昇し、圧縮されて温度が上がる", "空気が下降し、膨張して温度が下がる", "空気が下降し、圧縮されて温度が上がる"], "answer": 0, "explanation": "空気が上昇すると、上空は気圧が低いため空気が膨張します。膨張すると温度が下がり、露点に達して雲（水滴や氷の粒）ができます。" },
    { "question": "空気1㎥中にふくむことができる最大の水蒸気の量を何といいますか？", "options": ["飽和水蒸気量", "絶対湿度", "相対湿度", "露点水蒸気量"], "answer": 0, "explanation": "1㎥の空気が含むことができる限界の水蒸気量を「飽和水蒸気量」といいます。これは温度が高いほど大きくなります。" },
    { "question": "気温が上がると、飽和水蒸気量はどう変化しますか？", "options": ["大きくなる", "小さくなる", "変わらない", "ゼロになる"], "answer": 0, "explanation": "温度が高くなればなるほど、空気が多くの水蒸気を含むことができるようになります。つまり、飽和水蒸気量は大きくなります。" },
    { "question": "高気圧の中心付近では、どのような気流が生じて天気がどうなりますか？", "options": ["下降気流が生じ、晴れることが多い", "上昇気流が生じ、晴れることが多い", "下降気流が生じ、くもることが多い", "上昇気流が生じ、くもることが多い"], "answer": 0, "explanation": "高気圧の中心では、上空から地上へ空気が下りてくる「下降気流」が生じます。空気が圧縮されて温度が上がるため雲ができにくく、晴れます。" },
    { "question": "次のうち、冬の日本海側に大雪を降らせる風はどのような風ですか？", "options": ["北西の季節風", "南東の季節風", "南西の季節風", "北東の季節風"], "answer": 0, "explanation": "冬はシベリア高気圧から「北西の季節風」が吹き出します。これが日本海を渡る時に水蒸気を含み、山脈にぶつかって大雪を降らせます。" },
    { "question": "気圧の単位で現在よく使われているものはどれですか？", "options": ["hPa（ヘクトパスカル）", "mb（ミリバール）", "atm（アトム）", "Pa（パスカル）"], "answer": 0, "explanation": "現在、気象観測では気圧の単位として「hPa（ヘクトパスカル）」が使われます。1気圧は約1013hPaです。" }
  ],
  "fronts": [
    { "question": "寒気と暖気がぶつかる境目の面を何といいますか？", "options": ["前線面", "前線", "気団", "等圧面"], "answer": 0, "explanation": "性質の違う空気の塊（気団）がぶつかり合う境界面を「前線面」といいます。前線面が地表と交わる線が「前線」です。" },
    { "question": "寒気が暖気の下にもぐりこみながら進む前線を何といいますか？", "options": ["寒冷前線", "温暖前線", "停滞前線", "閉塞前線"], "answer": 0, "explanation": "冷たい空気（寒気）が温かい空気（暖気）を急激に押し上げながら進む前線を寒冷前線といいます。" },
    { "question": "温暖前線が通過したあと、気温と風向はどう変化することが多いですか？", "options": ["気温が上がり、南寄りの風になる", "気温が下がり、北寄りの風になる", "気温が上がり、北寄りの風になる", "気温が下がり、南寄りの風になる"], "answer": 0, "explanation": "温暖前線の後ろには暖気があるため、通過後は気温が上がり、風向は南寄りに変わります。" },
    { "question": "寒冷前線の通過時に起こりやすい天気の特徴はどれですか？", "options": ["短時間に強い雨が降り、雷や突風をともなう", "長時間にわたり、弱い雨がしとしと降る", "雲ひとつない快晴になる", "霧が発生しやすくなる"], "answer": 0, "explanation": "寒冷前線では暖気が急激に押し上げられるため、背の高い「積乱雲」ができやすく、短時間の強い雨（にわか雨）や雷をともないます。" },
    { "question": "寒気と暖気の勢力がほぼ同じで、ほとんど動かない前線を何といいますか？", "options": ["停滞前線", "寒冷前線", "温暖前線", "閉塞前線"], "answer": 0, "explanation": "勢力が拮抗して動かない前線を「停滞前線」といい、梅雨前線や秋雨前線がこれにあたります。長い間ぐずついた天気が続きます。" },
    { "question": "寒冷前線が温暖前線に追いついて重なり合った前線を何といいますか？", "options": ["閉塞前線", "停滞前線", "寒冷前線", "温暖前線"], "answer": 0, "explanation": "寒冷前線は温暖前線より進むスピードが速いため、やがて追いつきます。この重なった前線を「閉塞前線（へいそくぜんせん）」といいます。" },
    { "question": "温暖前線の近くでできやすい、横に平たく広がる雲は何ですか？", "options": ["乱層雲や高層雲", "積乱雲", "巻雲のみ", "積雲"], "answer": 0, "explanation": "温暖前線では暖気が寒気の上をゆるやかに這い上がるため、乱層雲や高層雲などの層状の雲が広範囲にでき、しとしと雨が降ります。" },
    { "question": "温帯で発生し、前線をともなう低気圧を何といいますか？", "options": ["温帯低気圧", "熱帯低気圧", "台風", "シベリア低気圧"], "answer": 0, "explanation": "日本付近の中緯度帯（温帯）で発生し、寒気と暖気がぶつかることで前線をともなう低気圧を「温帯低気圧」といいます。" },
    { "question": "日本付近を通過する温帯低気圧は、全体としてどちらの方角へ移動することが多いですか？", "options": ["西から東", "東から西", "南から北", "北から南"], "answer": 0, "explanation": "日本の上空には常に「偏西風」という西から東へ向かう強い風が吹いているため、低気圧や高気圧は西から東へ移動します。" },
    { "question": "寒冷前線の通過後、気温と風向はどう変化しますか？", "options": ["気温が下がり、北寄りの風に変わる", "気温が上がり、南寄りの風に変わる", "気温が上がり、北寄りの風に変わる", "気温が下がり、南寄りの風に変わる"], "answer": 0, "explanation": "寒冷前線の後ろには冷たい空気があるため、通過後は急に気温が下がり、風向も北西などの北寄りに変わります。" }
  ],
  "japan": [
    { "question": "冬の日本の気圧配置の代表的な特徴を何といいますか？", "options": ["西高東低", "南高北低", "東高西低", "北高南低"], "answer": 0, "explanation": "日本の西（大陸側）にシベリア高気圧があり、東（太平洋側）に低気圧がある「西高東低」の気圧配置になります。" },
    { "question": "冬に日本列島にふく強い季節風は、どの方角から吹きますか？", "options": ["北西", "南東", "南西", "北東"], "answer": 0, "explanation": "冬はシベリア高気圧から「北西」の季節風が吹き出します。これが日本海側で雪を、太平洋側に乾燥した晴天をもたらします。" },
    { "question": "夏の日本の気圧配置をもたらす、太平洋上で発達する高気圧を何といいますか？", "options": ["太平洋高気圧（小笠原気団）", "シベリア高気圧", "オホーツク海高気圧", "移動性高気圧"], "answer": 0, "explanation": "夏は日本の南東にある「太平洋高気圧（小笠原気団）」が発達し、日本を覆うため、蒸し暑い夏になります。" },

let currentQuestions = [];
let currentIndex = 0;
let userAnswers = [];
let currentMode = '';

function toggleTheme() {
  document.body.classList.toggle('dark-theme');
  const isDark = document.body.classList.contains('dark-theme');
  localStorage.setItem('quizTheme', isDark ? 'dark' : 'light');
}

window.onload = () => {
  if (localStorage.getItem('quizTheme') === 'dark') {
    document.body.classList.add('dark-theme');
  }
};

function startQuiz(mode) {
  currentMode = mode;
  let questions = [];

  if (mode === 'all') {
    Object.values(ALL_QUIZZES).forEach(arr => questions.push(...arr));
    questions = shuffleArray(questions);
  } else {
    questions = [...ALL_QUIZZES[mode]]; 
    questions = shuffleArray(questions);
  }

  currentQuestions = questions;
  currentIndex = 0;
  userAnswers = [];

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');

  const modeNames = {
    'all': '🔥 全問チャレンジ',
    'pressure': '気圧と風・雲のでき方',
    'fronts': '前線と天気の変化',
    'japan': '日本の天気（四季の特徴）',
    'practical': '🖼️ 実践編（画像問題）'
  };
  document.getElementById('mode-label').textContent = modeNames[mode];

  renderQuestion();
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  
  const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
  document.getElementById('progress-bar').style.width = `${progress}%`;
  document.getElementById('question-count').textContent = `Q. ${currentIndex + 1} / ${currentQuestions.length}`;

  document.getElementById('question-text').textContent = q.question;

  const imageWrap = document.getElementById('question-image-wrap');
  const imageEl = document.getElementById('question-image');
  const imageCaptionEl = document.getElementById('question-image-caption');
  if (q.image) {
    imageEl.src = q.image;
    imageCaptionEl.textContent = q.caption || '';
    imageWrap.style.display = 'block';
  } else {
    imageEl.removeAttribute('src');
    imageCaptionEl.textContent = '';
    imageWrap.style.display = 'none';
  }

  const optionsContainer = document.getElementById('options-grid');
  optionsContainer.innerHTML = '';
  
  const indexedOptions = q.options.map((opt, i) => ({ text: opt, index: i }));
  const shuffledOptions = shuffleArray(indexedOptions);

  shuffledOptions.forEach(optObj => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = optObj.text;
    btn.onclick = () => checkAnswer(optObj.index, btn);
    optionsContainer.appendChild(btn);
  });

  document.getElementById('explanation').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
}

function checkAnswer(selectedIndex, btnElement) {
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const q = currentQuestions[currentIndex];
  const isCorrect = (selectedIndex === q.answer);
  
  userAnswers.push({
    question: q.question,
    isCorrect: isCorrect,
    userSelect: q.options[selectedIndex],
    correctAnswer: q.options[q.answer],
    explanation: q.explanation,
    qIndex: currentIndex + 1
  });

  if (isCorrect) {
    btnElement.classList.add('correct');
  } else {
    btnElement.classList.add('incorrect');
    buttons.forEach(b => {
      if (b.textContent === q.options[q.answer]) {
        b.classList.add('correct');
      }
    });
  }

  const expBox = document.getElementById('explanation');
  document.getElementById('explanation-text').textContent = q.explanation;
  expBox.style.display = 'block';
  expBox.style.borderColor = isCorrect ? '#34c759' : '#ef4444';

  const nextBtn = document.getElementById('next-btn');
  if (currentIndex < currentQuestions.length - 1) {
    nextBtn.textContent = '次の問題へ';
  } else {
    nextBtn.textContent = '結果を見る';
  }
  nextBtn.style.display = 'block';
}

function nextQuestion() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.remove('hidden');

  const correctCount = userAnswers.filter(a => a.isCorrect).length;
  const total = userAnswers.length;
  const percentage = Math.round((correctCount / total) * 100);

  animateScore('score-num', correctCount);
  document.getElementById('total-num').textContent = total;

  const msgEl = document.getElementById('result-msg');
  if (percentage === 100) {
    msgEl.textContent = '🎉 完璧です！素晴らしい知識！';
    msgEl.style.color = '#34c759';
  } else if (percentage >= 80) {
    msgEl.textContent = '👏 素晴らしい！あと少しで満点です。';
    msgEl.style.color = '#007aff';
  } else {
    msgEl.textContent = '💪 お疲れ様でした！復習して苦手をなくしましょう。';
    msgEl.style.color = '#ff9500';
  }

  const wrongList = document.getElementById('wrong-list');
  const wrongItems = document.getElementById('wrong-items');
  wrongItems.innerHTML = '';
  
  const wrongs = userAnswers.filter(a => !a.isCorrect);
  if (wrongs.length > 0) {
    wrongList.style.display = 'block';
    wrongs.forEach(w => {
      const li = document.createElement('li');
      li.style.marginBottom = '10px';
      li.innerHTML = `
        <strong>Q${w.qIndex}:</strong> ${w.question}<br>
        <span style="color:#ef4444">あなたの回答: ${w.userSelect}</span> / 
        <span style="color:#34c759">正解: ${w.correctAnswer}</span><br>
        <span style="font-size:0.9em; color:#666;">💡 ${w.explanation}</span>
      `;
      wrongItems.appendChild(li);
    });
  } else {
    wrongList.style.display = 'none';
  }
}

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function animateScore(id, target) {
  let current = 0;
  const el = document.getElementById(id);
  const interval = setInterval(() => {
    if (current >= target) {
      clearInterval(interval);
      el.textContent = target;
    } else {
      current++;
      el.textContent = current;
    }
  }, 50);
}

function showStartScreen() {
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
}

function retryQuiz() {
  startQuiz(currentMode);
}
</script>
